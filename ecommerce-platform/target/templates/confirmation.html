<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed : Target</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="tgt-checkout-body">
    <header class="tgt-checkout-header">
        <div class="tgt-bullseye" style="font-size:28px;">◎</div>
        <span class="tgt-checkout-title">Order Confirmed</span>
    </header>

    <main class="tgt-confirmation-main">
        <div class="tgt-confirmation-card">
            <span class="material-icons" style="font-size:56px;color:#008300;">check_circle</span>
            <h1>Thanks for your order!</h1>
            <p class="tgt-conf-order">Order # <span id="orderId"></span></p>
            <p class="tgt-conf-msg">We'll send a confirmation email with your order details and tracking info.</p>
            <div class="tgt-conf-item">
                <span class="material-icons" style="font-size:48px;color:#999;">headphones</span>
                <div>
                    <strong>Sony WH-1000XM5 Wireless Headphones</strong>
                    <p class="tgt-green">Estimated delivery: Wed, Mar 18</p>
                </div>
            </div>
            <a href="/" class="tgt-continue-btn">Continue shopping</a>
        </div>
    </main>

    <script>
    var params = new URLSearchParams(window.location.search);
    document.getElementById('orderId').textContent = params.get('order') || 'TGT-20260313';
    </script>
</body>
</html>
