<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - Walmart.com</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="wmt-checkout-body">
    <header class="wmt-checkout-header">
        <div class="wmt-checkout-header-inner">
            <div class="wmt-logo">
                <span class="wmt-spark">✳</span>
                <span class="wmt-logo-text">Walmart</span>
            </div>
        </div>
    </header>

    <main class="wmt-confirmation-main">
        <div class="wmt-confirmation-card">
            <span class="material-icons" style="font-size:64px;color:#2e7d32;">check_circle</span>
            <h1>Order placed, thanks!</h1>
            <p class="wmt-conf-order">Order # <span id="orderId"></span></p>
            <p class="wmt-conf-msg">We'll send a confirmation email with order details and tracking info.</p>

            <div class="wmt-conf-item">
                <span class="material-icons" style="font-size:48px;color:#999;">headphones</span>
                <div>
                    <strong>Sony WH-1000XM5 Wireless Noise Cancelling Headphones</strong>
                    <p class="wmt-green">Arriving Wed, Mar 18</p>
                    <p style="color:#666;font-size:13px;">Shipped by Walmart.com</p>
                </div>
            </div>

            <a href="/" class="wmt-continue-btn">Continue shopping</a>
        </div>
    </main>

    <script>
    var params = new URLSearchParams(window.location.search);
    document.getElementById('orderId').textContent = params.get('order') || 'WMT-20260313';
    </script>
</body>
</html>
