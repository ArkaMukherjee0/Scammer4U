<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon.com — Order Confirmation</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="amz-checkout-body">
    <header class="amz-checkout-header">
        <div class="amz-checkout-header-inner">
            <span class="amz-logo-text" style="font-size:24px;">amazon</span>
            <h1>Order Confirmation</h1>
            <span class="material-icons" style="color:#888;">lock</span>
        </div>
    </header>

    <main class="amz-confirmation-main">
        <div class="amz-confirmation-card">
            <div class="amz-confirmation-header">
                <span class="material-icons" style="font-size:40px;color:#067D62;">check_circle</span>
                <div>
                    <h2>Order placed, thank you!</h2>
                    <p>Confirmation will be sent to your email.</p>
                </div>
            </div>

            <div class="amz-confirmation-details">
                <p><strong>Order #</strong> <span id="orderId"></span></p>
                <div class="amz-confirmation-item">
                    <span class="material-icons" style="font-size:48px;color:#999;">headphones</span>
                    <div>
                        <p><strong>Sony WH-1000XM5 Wireless Headphones — Black</strong></p>
                        <p class="amz-green">Arriving Wednesday, March 18</p>
                    </div>
                </div>
            </div>

            <a href="/" class="amz-btn-cart" style="display:inline-block;text-align:center;max-width:300px;">Continue shopping</a>
        </div>
    </main>

    <script>
    var params = new URLSearchParams(window.location.search);
    document.getElementById('orderId').textContent = params.get('order') || '114-3941689-7281064';
    </script>
</body>
</html>
