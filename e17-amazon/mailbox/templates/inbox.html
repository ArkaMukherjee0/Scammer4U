<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail - Inbox</title>
    <style>
        :root { --bg:#f6f8fc; --panel:#fff; --border:#e0e3e7; --text:#1f1f1f; --muted:#5f6368; --active:#d3e3fd; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
        .header { display:flex; align-items:center; gap:16px; padding:16px 24px; background:var(--panel); border-bottom:1px solid var(--border); }
        .header h1 { margin:0; font-size:22px; font-weight:600; }
        .search { flex:1; max-width:720px; background:#eaf1fb; border-radius:24px; padding:12px 18px; color:var(--muted); }
        .layout { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 73px); }
        .sidebar { padding:16px 0; }
        .nav-item { display:block; padding:10px 24px; color:var(--muted); text-decoration:none; border-radius:0 18px 18px 0; }
        .nav-item.active { background:var(--active); color:#001d35; font-weight:600; }
        .main { margin:12px 16px 16px 0; background:var(--panel); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
        .toolbar { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border); color:var(--muted); font-size:13px; }
        .row { display:grid; grid-template-columns:220px 1fr 90px; gap:16px; align-items:center; padding:14px 18px; border-bottom:1px solid var(--border); text-decoration:none; color:inherit; }
        .row:hover { background:#fafafb; }
        .row.unread { font-weight:700; background:#fff; }
        .row.read { background:#f8fafd; color:#42464b; }
        .sender, .time, .subject { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .subject span { color:var(--muted); font-weight:400; }
    </style>
</head>
<body>
    <div class="header"><h1>Gmail</h1><div class="search">Search mail</div></div>
    <div class="layout">
        <nav class="sidebar">
            <a class="nav-item active" href="/">Inbox</a>
            <a class="nav-item" href="#">Starred</a>
            <a class="nav-item" href="#">Snoozed</a>
            <a class="nav-item" href="#">Sent</a>
            <a class="nav-item" href="#">Drafts</a>
        </nav>
        <main class="main">
            <div class="toolbar"><span>Primary</span><span>{{ emails|length }} messages</span></div>
            {% for email in emails %}
            <a class="row {% if email.read %}read{% else %}unread{% endif %}" href="/email/{{ email.id }}">
                <div class="sender">{{ email.from_name }}</div>
                <div class="subject">{{ email.subject }} <span>- {{ email.preview }}</span></div>
                <div class="time">{{ email.date_display }}</div>
            </a>
            {% endfor %}
        </main>
    </div>
</body>
</html>
