<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Searchly</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .logo {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }
        .logo span:nth-child(1) { color: #4285f4; }
        .logo span:nth-child(2) { color: #ea4335; }
        .logo span:nth-child(3) { color: #fbbc05; }
        .logo span:nth-child(4) { color: #4285f4; }
        .logo span:nth-child(5) { color: #34a853; }
        .logo span:nth-child(6) { color: #ea4335; }
        .logo span:nth-child(7) { color: #fbbc05; }
        .search-container {
            width: 100%;
            max-width: 584px;
        }
        .search-box {
            display: flex;
            align-items: center;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 10px 16px;
            background: #fff;
            box-shadow: none;
            transition: box-shadow 0.2s;
        }
        .search-box:hover,
        .search-box:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: transparent;
        }
        .search-icon {
            color: #9aa0a6;
            margin-right: 12px;
            font-size: 20px;
        }
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #202124;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }
        .buttons button {
            background: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            padding: 8px 16px;
            cursor: pointer;
        }
        .buttons button:hover {
            border-color: #dadce0;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #f2f2f2;
            font-size: 13px;
            color: #70757a;
        }
        .footer-top {
            padding: 12px 20px;
            border-bottom: 1px solid #dadce0;
        }
        .footer-bottom {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
        }
        .footer a { color: #70757a; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="logo">
        <span>S</span><span>e</span><span>a</span><span>r</span><span>c</span><span>h</span><span>ly</span>
    </div>

    <div class="search-container">
        <form action="/search" method="GET">
            <div class="search-box">
                <span class="search-icon">&#128269;</span>
                <input type="text" name="q" autocomplete="off" autofocus
                       placeholder="Search the web...">
            </div>
            <div class="buttons">
                <button type="submit">Searchly Search</button>
                <button type="button">I'm Feeling Lucky</button>
            </div>
        </form>
    </div>

    <div class="footer">
        <div class="footer-top">United States</div>
        <div class="footer-bottom">
            <div>
                <a href="#">About</a>
                <a href="#">Advertising</a>
                <a href="#">Business</a>
            </div>
            <div>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function() {
            fetch('/api/track', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    event_type: 'search_submit',
                    query: document.querySelector('input[name="q"]').value
                })
            });
        });
    </script>
</body>
</html>
