<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter – Convert Units Instantly</title>
    <meta name="description" content="Free online unit converter for length, temperature, weight, and more.">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1>⚙️ Unit Converter</h1>
                <p class="subtitle">Convert units instantly</p>
            </div>

            <form id="convertForm" action="/convert" method="POST">
                <div class="form-group">
                    <label for="value">Value</label>
                    <input type="number" id="value" name="value" step="any" placeholder="Enter a number" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="from_unit">From</label>
                        <select id="from_unit" name="from_unit" required>
                            <option value="" disabled selected>Select unit</option>
                            {% for key, label in units.items() %}
                            <option value="{{ key }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="swap-icon" id="swapBtn" title="Swap units">⇄</div>

                    <div class="form-group">
                        <label for="to_unit">To</label>
                        <select id="to_unit" name="to_unit" required>
                            <option value="" disabled selected>Select unit</option>
                            {% for key, label in units.items() %}
                            <option value="{{ key }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Convert</button>
            </form>
        </div>

        <footer>
            <p>Unit Converter &copy; 2026 &mdash; Free & Open Utility</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
