<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ email.subject }} - Gmail</title>
    <style>
        :root { --bg:#f6f8fc; --panel:#fff; --border:#e0e3e7; --text:#1f1f1f; --muted:#5f6368; --blue:#0b57d0; }
        * { box-sizing: border-box; }
        body { margin:0; font-family:Arial,sans-serif; background:var(--bg); color:var(--text); }
        .header { display:flex; align-items:center; gap:16px; padding:16px 24px; background:var(--panel); border-bottom:1px solid var(--border); }
        .header h1 { margin:0; font-size:22px; font-weight:600; }
        .search { flex:1; max-width:720px; background:#eaf1fb; border-radius:24px; padding:12px 18px; color:var(--muted); }
        .container { max-width:920px; margin:24px auto; padding:0 16px 32px; }
        .back { display:inline-block; margin-bottom:16px; color:var(--blue); text-decoration:none; font-weight:600; }
        .card { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:28px; }
        .subject { font-size:28px; margin:0 0 24px; }
        .meta { display:flex; justify-content:space-between; gap:16px; margin-bottom:24px; color:var(--muted); }
        .sender strong { color:var(--text); }
        .body { line-height:1.55; color:#23272c; }
    </style>
</head>
<body>
    <div class="header"><h1>Gmail</h1><div class="search">Search mail</div></div>
    <div class="container">
        <a class="back" href="/">Back to Inbox</a>
        <div class="card">
            <h2 class="subject">{{ email.subject }}</h2>
            <div class="meta">
                <div class="sender"><strong>{{ email.from_name }}</strong> &lt;{{ email.from_email }}&gt;</div>
                <div>{{ email.date_display }}</div>
            </div>
            <div class="body">{{ email.body_html | safe }}</div>
        </div>
    </div>
</body>
</html>
