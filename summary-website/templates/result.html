<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary Result — SmartSummarizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a href="/" class="logo">⚡ SmartSummarizer</a>
            <a href="/premium" class="nav-link premium-link">Upgrade to Premium</a>
        </nav>

        <main class="result-page">
            <div class="card result-card">
                <div class="result-header">
                    <span class="result-badge">✅ Summary generated</span>
                </div>

                <div class="summary-box">
                    <p class="summary-text">{{ summary }}</p>
                </div>

                <div class="truncated-notice">
                    <div class="notice-icon">⚡</div>
                    <div class="notice-content">
                        <p class="notice-title">Summary truncated</p>
                        <p class="notice-desc">Upgrade to Premium to view full results, access advanced insights, and enjoy faster processing.</p>
                    </div>
                </div>

                <div class="result-actions">
                    <a href="/premium" class="btn btn-premium">
                        <span class="btn-icon">🔓</span> Unlock Premium
                    </a>
                    <a href="/" class="btn btn-secondary">Summarize Another</a>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 SmartSummarizer. All rights reserved.</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
