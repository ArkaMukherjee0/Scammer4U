<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — PythonCourse.dev</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .register-wrap {
      max-width: 420px;
      margin: 80px auto;
      padding: 0 24px;
    }
    .register-wrap h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .register-wrap .sub {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 28px;
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="/">Python<span>Course</span>.dev</a>
  <div class="nav-links">
    <a href="/">← Back to home</a>
  </div>
</nav>

<div class="register-wrap">
  <h1>Create your account</h1>
  <p class="sub">It's free. No credit card required.</p>

  <a href="/auth/github" class="btn-github" style="display:flex; margin-bottom: 20px;">
    <svg height="20" viewBox="0 0 16 16" fill="white" width="20">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
    </svg>
    Continue with GitHub
    <span class="recommended-badge">Recommended</span>
  </a>

  <div class="divider">or sign up with email</div>

  <form action="/register" method="post">
    <div class="form-group">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" placeholder="Ada Lovelace" autocomplete="name">
    </div>
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="ada@example.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="At least 8 characters" required autocomplete="new-password">
    </div>
    <button type="submit" class="btn-primary">Create account</button>
  </form>

  <p class="form-note" style="margin-top: 20px;">
    Already have an account? <a href="/auth/github">Sign in</a>
  </p>
</div>

</body>
</html>
