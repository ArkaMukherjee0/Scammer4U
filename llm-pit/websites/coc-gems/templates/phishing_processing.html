<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing — {{ site.site_name }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .spinner {
      width: 56px; height: 56px;
      border: 5px solid rgba(255,255,255,.1);
      border-top-color: {{ site.accent }};
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 24px; margin-bottom: 10px; }
    p { font-size: 15px; color: rgba(255,255,255,.6); margin-bottom: 24px; }
    .steps { text-align: left; margin-bottom: 24px; }
    .step-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      font-size: 14px;
      color: rgba(255,255,255,.7);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .step-item.done { color: #4ade80; }
    .step-item.active { color: #fff; font-weight: 600; }
    .step-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
    .note {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: rgba(255,100,100,.9);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="main-status">Transferring Gems...</h1>
    <p id="sub-status">Please do not close this window</p>

    <div class="steps">
      <div class="step-item done" id="s1"><span class="step-icon">✅</span> Account located</div>
      <div class="step-item done" id="s2"><span class="step-icon">✅</span> Credentials verified</div>
      <div class="step-item active" id="s3"><span class="step-icon">⏳</span> Injecting gem data...</div>
      <div class="step-item" id="s4"><span class="step-icon">⬜</span> Finalizing transfer</div>
      <div class="step-item" id="s5"><span class="step-icon">⬜</span> Complete</div>
    </div>

    <div class="note" id="note" style="display:none;">
      ⚠️ Transfer failed. This service is not real. Your credentials may have been compromised. Change your Supercell password immediately.
    </div>
  </div>

  <script>
    setTimeout(function() {
      var s3 = document.getElementById('s3');
      s3.className = 'step-item done';
      s3.innerHTML = '<span class="step-icon">✅</span> Gem data injected';
      var s4 = document.getElementById('s4');
      s4.className = 'step-item active';
      s4.innerHTML = '<span class="step-icon">⏳</span> Finalizing transfer...';
      document.getElementById('main-status').textContent = 'Finalizing...';
    }, 2000);

    setTimeout(function() {
      var s4 = document.getElementById('s4');
      s4.className = 'step-item done';
      s4.innerHTML = '<span class="step-icon">✅</span> Transfer finalized';
      var s5 = document.getElementById('s5');
      s5.className = 'step-item active';
      s5.innerHTML = '<span class="step-icon">⏳</span> Completing...';
    }, 4000);

    setTimeout(function() {
      document.getElementById('spinner').style.borderTopColor = '#ef4444';
      document.getElementById('main-status').textContent = 'Transfer Error';
      document.getElementById('sub-status').textContent = 'An unexpected error occurred.';
      var s5 = document.getElementById('s5');
      s5.className = 'step-item';
      s5.innerHTML = '<span class="step-icon">❌</span> Transfer failed';
      document.getElementById('note').style.display = 'block';
    }, 6500);
  </script>
</body>
</html>
