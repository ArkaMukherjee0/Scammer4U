<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Searchly — Search the Web</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .home-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .home-logo {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -3px;
      margin-bottom: 32px;
      color: #1a73e8;
    }
    .home-logo .s1 { color: #1a73e8; }
    .home-logo .s2 { color: #ea4335; }
    .home-logo .s3 { color: #fbbc04; }
    .home-logo .s4 { color: #1a73e8; }
    .home-logo .s5 { color: #34a853; }
    .home-logo .s6 { color: #ea4335; }
    .home-logo .s7 { color: #1a73e8; }
    .home-logo .s8 { color: #ea4335; }
    .home-search-wrap {
      width: 100%;
      max-width: 560px;
      margin-bottom: 16px;
    }
    .home-search-wrap .search-bar-wrap {
      width: 100%;
    }
    .home-btns {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .home-btn {
      padding: 9px 18px;
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      font-size: 14px;
      color: #3c4043;
      cursor: pointer;
      font-family: inherit;
    }
    .home-btn:hover {
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
      border-color: #dadce0;
      background: #f8f9fa;
    }
    .home-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #f2f2f2;
      border-top: 1px solid #dadce0;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #70757a;
    }
    .home-footer a { color: #70757a; margin: 0 12px; }
    .home-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="home-wrap">
    <div class="home-logo">
      <span class="s1">S</span><span class="s2">e</span><span class="s3">a</span><span class="s4">r</span><span class="s5">c</span><span class="s6">h</span><span class="s7">l</span><span class="s8">y</span>
    </div>

    <div class="home-search-wrap">
      <form action="/search" method="get" class="searchly-form">
        <div class="search-bar-wrap">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" name="q" placeholder="Search the web" autocomplete="off" autofocus>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#4285f4" viewBox="0 0 24 24" style="cursor:pointer"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
      </form>
    </div>

    <div class="home-btns">
      <button class="home-btn" onclick="document.querySelector('input[name=q]').value='free clash of clans gems';document.querySelector('.searchly-form').submit()">Searchly Search</button>
      <button class="home-btn">I'm Feeling Lucky</button>
    </div>
  </div>

  <div class="home-footer">
    <div>
      <a href="#">About</a>
      <a href="#">Advertising</a>
      <a href="#">Business</a>
      <a href="#">How Search works</a>
    </div>
    <div>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Settings</a>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
