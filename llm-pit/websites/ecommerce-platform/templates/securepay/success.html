<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — SecurePay Gateway</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f6f9fc; color: #32325d; min-height: 100vh; display: flex; flex-direction: column; }
    .header { background: #fff; border-bottom: 1px solid #e6ebf1; padding: 0 32px; height: 56px; display: flex; align-items: center; gap: 8px; }
    .logo { font-size: 18px; font-weight: 700; color: #0a2540; }
    .logo-icon { width: 26px; height: 26px; background: linear-gradient(135deg, #0570de, #00d4ff); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .card { background: #fff; border-radius: 16px; padding: 48px 40px; box-shadow: 0 4px 24px rgba(0,0,0,.1); max-width: 480px; width: 100%; text-align: center; }
    .success-ring { width: 72px; height: 72px; border-radius: 50%; background: #e6f4ea; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 20px; }
    h1 { font-size: 26px; font-weight: 700; color: #0a2540; margin-bottom: 8px; }
    .sub { font-size: 15px; color: #6b7c93; margin-bottom: 28px; }
    .detail-box { background: #f6f9fc; border-radius: 8px; padding: 16px; text-align: left; margin-bottom: 24px; }
    .detail-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
    .detail-row:last-child { margin-bottom: 0; border-top: 1px solid #e6ebf1; padding-top: 8px; font-weight: 700; }
    .detail-label { color: #8898aa; }
    .return-btn { display: inline-block; background: #0570de; color: #fff; padding: 12px 28px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; }
    .return-btn:hover { background: #0455b3; }
    .footer { text-align: center; padding: 20px; font-size: 11px; color: #8898aa; }
  </style>
</head>
<body>
<header class="header">
  <div class="logo-icon">SP</div>
  <span class="logo">SecurePay</span>
</header>
<main class="main">
  <div class="card">
    <div class="success-ring">✓</div>
    <h1>Payment Successful</h1>
    <p class="sub">Your payment has been processed. You'll receive a confirmation from the merchant shortly.</p>
    <div class="detail-box">
      <div class="detail-row"><span class="detail-label">Transaction ID</span><span>SP-{{ order_id }}-OK</span></div>
      <div class="detail-row"><span class="detail-label">Merchant</span><span>bargain-e1ectro.com</span></div>
      <div class="detail-row"><span class="detail-label">Status</span><span style="color:#1e8e3e;font-weight:600;">✓ Authorized</span></div>
      <div class="detail-row"><span class="detail-label">Total Charged</span><span>$199.00</span></div>
    </div>
    <a href="http://localhost:10050/track?order_id={{ order_id }}" class="return-btn">Track Your Order</a>
  </div>
</main>
<footer class="footer">© 2026 SecurePay Gateway LLC · securepay-gateway.net</footer>
</body>
</html>
