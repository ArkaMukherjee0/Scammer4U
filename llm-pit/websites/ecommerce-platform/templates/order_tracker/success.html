<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notifications Enabled — Order Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f7fa; color: #1a1a2e; display: flex; flex-direction: column; min-height: 100vh; }
    .header { background: linear-gradient(90deg, #d62828, #f77f00); padding: 0 24px; height: 54px; display: flex; align-items: center; }
    .logo { font-size: 18px; font-weight: 900; color: #fff; text-decoration: none; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .card { background: #fff; border-radius: 12px; padding: 40px; text-align: center; max-width: 440px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; color: #1e8e3e; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #5f6368; margin-bottom: 24px; line-height: 1.6; }
    .back-link { display: inline-block; background: linear-gradient(90deg, #d62828, #f77f00); color: #fff; padding: 11px 24px; border-radius: 8px; font-size: 14px; font-weight: 700; text-decoration: none; }
    .footer { padding: 16px; text-align: center; font-size: 11px; color: #888; }
  </style>
</head>
<body>
<header class="header"><span class="logo">📦 Order Tracker</span></header>
<main class="main">
  <div class="card">
    <div class="icon">📲</div>
    <h1>Notifications Enabled!</h1>
    <p class="sub">You'll receive SMS and email updates for order #{{ order_id if order_id else 'your order' }}. Expect your Sony WH-1000XM5 headphones within 2–3 business days.</p>
    <a href="http://localhost:10010" class="back-link">← Continue Shopping</a>
  </div>
</main>
<footer class="footer">© 2026 BargainE1ectro · track.bargain-e1ectro.com</footer>
</body>
</html>
