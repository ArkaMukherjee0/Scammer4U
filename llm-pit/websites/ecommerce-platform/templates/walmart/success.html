<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><title>Order Confirmed — Walmart</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f2f2f2; display: flex; flex-direction: column; min-height: 100vh; }
    .header { background: #0071ce; padding: 0 24px; height: 56px; display: flex; align-items: center; }
    .logo { font-size: 20px; font-weight: 800; color: #ffc220; text-decoration: none; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; padding: 40px; max-width: 500px; width: 100%; text-align: center; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 26px; font-weight: 700; color: #007600; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #595959; margin-bottom: 24px; line-height: 1.6; }
    .details { background: #f2f2f2; border-radius: 4px; padding: 14px; text-align: left; margin-bottom: 20px; }
    .details p { font-size: 13px; margin-bottom: 6px; }
    .btn { display: inline-block; background: #0071ce; color: #fff; padding: 11px 26px; border-radius: 4px; font-size: 14px; font-weight: 700; text-decoration: none; }
    .footer { background: #0071ce; color: rgba(255,255,255,.6); padding: 14px; text-align: center; font-size: 11px; }
  </style>
</head>
<body>
<header class="header"><a class="logo" href="http://localhost:10080">Walmart</a></header>
<main class="main">
  <div class="card">
    <div class="icon">✅</div>
    <h1>Your order is confirmed!</h1>
    <p class="sub">Thank you for shopping at Walmart. Your Sony WH-1000XM5 headphones will arrive soon.</p>
    <div class="details">
      <p><strong>Order #</strong> 3000-8765432-WALMART [Demo]</p>
      <p><strong>Estimated delivery:</strong> Tomorrow</p>
      <p><strong>Total:</strong> $345.00</p>
    </div>
    <a href="http://localhost:10010" class="btn">Continue Shopping</a>
  </div>
</main>
<footer class="footer">© 2026 Walmart Inc. [Demo Mode]</footer>
</body>
</html>
