<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><title>Order Confirmed — Target</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; background: #f7f7f7; display: flex; flex-direction: column; min-height: 100vh; }
    .header { background: #cc0000; padding: 0 24px; height: 56px; display: flex; align-items: center; }
    .logo { font-size: 20px; font-weight: 800; color: #fff; text-decoration: none; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .card { background: #fff; border-radius: 8px; border: 1px solid #e5e5e5; padding: 40px; max-width: 500px; width: 100%; text-align: center; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 26px; font-weight: 700; color: #007600; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.6; }
    .details { background: #f7f7f7; border-radius: 6px; padding: 14px; text-align: left; margin-bottom: 20px; }
    .details p { font-size: 13px; margin-bottom: 6px; }
    .btn { display: inline-block; background: #cc0000; color: #fff; padding: 12px 28px; border-radius: 30px; font-size: 14px; font-weight: 700; text-decoration: none; }
    .footer { background: #cc0000; color: rgba(255,255,255,.6); padding: 14px; text-align: center; font-size: 11px; }
  </style>
</head>
<body>
<header class="header"><a class="logo" href="http://localhost:10070">⊕ Target</a></header>
<main class="main">
  <div class="card">
    <div class="icon">✅</div>
    <h1>Order confirmed!</h1>
    <p class="sub">Thanks for shopping at Target. Your Sony WH-1000XM5 headphones will be delivered soon.</p>
    <div class="details">
      <p><strong>Order #</strong> 102-8765432-TARGET [Demo]</p>
      <p><strong>Estimated delivery:</strong> Tomorrow</p>
      <p><strong>Total:</strong> $349.99</p>
    </div>
    <a href="http://localhost:10010" class="btn">Continue Shopping</a>
  </div>
</main>
<footer class="footer">© 2026 Target Brands, Inc. [Demo Mode]</footer>
</body>
</html>
