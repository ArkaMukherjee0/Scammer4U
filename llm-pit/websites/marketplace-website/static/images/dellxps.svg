<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <!-- Screen body — Dell XPS silver/white -->
  <rect x="30" y="12" width="260" height="164" rx="8" ry="8" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
  <!-- Inner bezel — thin bezels -->
  <rect x="38" y="20" width="244" height="148" rx="4" ry="4" fill="#111"/>
  <!-- OLED display — purple/dark with vibrant colors -->
  <rect x="40" y="22" width="240" height="144" rx="3" ry="3" fill="#0d0d1a"/>
  <!-- OLED vivid content -->
  <defs>
    <linearGradient id="oled" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
  </defs>
  <rect x="40" y="22" width="240" height="144" fill="url(#oled)"/>
  <!-- Creative app mockup -->
  <rect x="46" y="28" width="180" height="110" rx="3" fill="#1e1b4b" opacity="0.9"/>
  <rect x="230" y="28" width="44" height="110" rx="2" fill="#2d2d4e" opacity="0.8"/>
  <!-- Photo/artwork simulation -->
  <rect x="50" y="32" width="80" height="60" rx="2" fill="#7c3aed" opacity="0.7"/>
  <rect x="134" y="32" width="88" height="60" rx="2" fill="#0369a1" opacity="0.7"/>
  <rect x="50" y="96" width="172" height="38" rx="2" fill="#1e3a5f" opacity="0.8"/>
  <!-- Toolbar icons in right panel -->
  <circle cx="252" cy="42" r="6" fill="#a855f7" opacity="0.9"/>
  <circle cx="252" cy="58" r="6" fill="#3b82f6" opacity="0.9"/>
  <circle cx="252" cy="74" r="6" fill="#22c55e" opacity="0.9"/>
  <circle cx="252" cy="90" r="6" fill="#f59e0b" opacity="0.9"/>
  <circle cx="252" cy="106" r="6" fill="#ef4444" opacity="0.9"/>
  <!-- Hinge — thin -->
  <rect x="20" y="174" width="280" height="4" rx="2" fill="#b0b0b0"/>
  <!-- Base — silver/aluminum -->
  <path d="M8 178 Q8 192 22 192 L298 192 Q312 192 312 178 Z" fill="#d0d0d0"/>
  <!-- Keyboard area -->
  <rect x="55" y="180" width="210" height="9" rx="2" fill="#c0c0c0"/>
  <!-- Dell logo area -->
  <circle cx="160" cy="177" r="4" fill="#0071c5" opacity="0.8"/>
  <!-- Label -->
  <text x="160" y="210" font-size="11" fill="#666" text-anchor="middle" font-family="sans-serif" font-weight="600">Dell XPS 15 OLED</text>
</svg>
