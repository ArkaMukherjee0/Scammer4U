<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <!-- Screen body -->
  <rect x="40" y="20" width="240" height="155" rx="10" ry="10" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <!-- Screen bezel inner -->
  <rect x="48" y="28" width="224" height="139" rx="4" ry="4" fill="#0d1117"/>
  <!-- Display content -->
  <rect x="52" y="32" width="216" height="131" rx="2" ry="2" fill="#1c2333"/>
  <!-- macOS-style menu bar -->
  <rect x="52" y="32" width="216" height="16" fill="#2d3748"/>
  <circle cx="62" cy="40" r="4" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="4" fill="#febc2e"/>
  <circle cx="86" cy="40" r="4" fill="#28c840"/>
  <!-- Desktop icons suggestion -->
  <rect x="64" y="58" width="20" height="16" rx="3" fill="#3b82f6" opacity="0.8"/>
  <rect x="90" y="58" width="20" height="16" rx="3" fill="#8b5cf6" opacity="0.8"/>
  <rect x="116" y="58" width="20" height="16" rx="3" fill="#ec4899" opacity="0.8"/>
  <!-- Dock -->
  <rect x="100" y="148" width="120" height="10" rx="5" fill="#2d3748" opacity="0.9"/>
  <circle cx="116" cy="153" r="3" fill="#3b82f6"/>
  <circle cx="128" cy="153" r="3" fill="#22c55e"/>
  <circle cx="140" cy="153" r="3" fill="#f59e0b"/>
  <circle cx="152" cy="153" r="3" fill="#ec4899"/>
  <circle cx="164" cy="153" r="3" fill="#a78bfa"/>
  <!-- Hinge area -->
  <rect x="30" y="173" width="260" height="6" rx="2" fill="#2a2a2a"/>
  <!-- Base / keyboard -->
  <path d="M10 179 Q10 188 20 188 L300 188 Q310 188 310 179 Z" fill="#c8c8c8"/>
  <!-- Keyboard surface -->
  <rect x="55" y="181" width="210" height="5" rx="2" fill="#aaa"/>
  <!-- Apple logo -->
  <text x="158" y="178" font-size="10" fill="#555" text-anchor="middle" font-family="sans-serif"></text>
  <!-- Label -->
  <text x="160" y="208" font-size="11" fill="#666" text-anchor="middle" font-family="sans-serif" font-weight="600">MacBook Pro 14" M3</text>
</svg>
