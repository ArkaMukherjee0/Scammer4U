<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <!-- Screen body — ThinkPad black rectangle style -->
  <rect x="35" y="15" width="250" height="160" rx="5" ry="5" fill="#222" stroke="#111" stroke-width="1.5"/>
  <!-- Screen bezel -->
  <rect x="44" y="24" width="232" height="143" rx="3" ry="3" fill="#0a0a0a"/>
  <!-- Display -->
  <rect x="48" y="28" width="224" height="135" rx="2" ry="2" fill="#1a2035"/>
  <!-- Windows-style taskbar -->
  <rect x="48" y="150" width="224" height="13" fill="#1e2a42"/>
  <!-- Start button area -->
  <rect x="52" y="153" width="24" height="7" rx="2" fill="#3b82f6" opacity="0.9"/>
  <!-- Taskbar icons -->
  <rect x="170" y="154" width="6" height="5" rx="1" fill="#64748b"/>
  <rect x="178" y="154" width="6" height="5" rx="1" fill="#64748b"/>
  <!-- Windows desktop -->
  <rect x="48" y="28" width="224" height="122" fill="#1a3a5c"/>
  <rect x="48" y="28" width="224" height="122" fill="url(#grad)" opacity="0.6"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- Desktop icons -->
  <rect x="56" y="36" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.85"/>
  <rect x="56" y="54" width="18" height="14" rx="2" fill="#6366f1" opacity="0.85"/>
  <rect x="56" y="72" width="18" height="14" rx="2" fill="#0ea5e9" opacity="0.85"/>
  <!-- ThinkPad red dot (TrackPoint) -->
  <circle cx="160" cy="174" r="4" fill="#cc0000"/>
  <!-- Hinge -->
  <rect x="25" y="173" width="270" height="5" rx="2" fill="#111"/>
  <!-- Base -->
  <path d="M15 178 Q15 190 28 190 L292 190 Q305 190 305 178 Z" fill="#333"/>
  <!-- Palm rest area -->
  <rect x="60" y="180" width="200" height="8" rx="2" fill="#2a2a2a"/>
  <!-- Label -->
  <text x="160" y="208" font-size="11" fill="#666" text-anchor="middle" font-family="sans-serif" font-weight="600">ThinkPad X1 Carbon</text>
</svg>
