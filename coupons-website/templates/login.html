<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your DealVault account to reveal exclusive coupon codes.">
  <title>Sign In - DealVault</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <div class="brand-icon">🏷️</div>
      DealVault
    </a>
    <ul class="nav-links">
      <li><a href="/">Deals</a></li>
      <li><a href="#">Categories</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>

  <!-- Page Content -->
  <main class="page-wrapper">
    <div class="login-container">
      <div class="login-card" id="login-card">
        <div class="login-header">
          <div class="login-icon">🔐</div>
          <h2>Welcome Back</h2>
          <p>Sign in to reveal your coupon code</p>
        </div>

        <form id="login-form" action="/log-interaction" method="POST">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
            >
            <div class="form-error" id="email-error"></div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
            >
            <div class="form-error" id="password-error"></div>
          </div>

          <button type="submit" class="btn btn-primary" id="sign-in-btn">
            Sign In
          </button>
        </form>

        <div class="form-footer">
          <a href="#">Forgot password?</a>
        </div>
      </div>
    </div>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
