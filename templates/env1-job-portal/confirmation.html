<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted | TalentBridge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            font-size: 14px;
        }
        .nav {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 56px;
        }
        .nav-logo {
            font-size: 20px;
            font-weight: 700;
            color: #2563eb;
            text-decoration: none;
        }
        .nav-logo span { color: #1a1a2e; }

        .container {
            max-width: 560px;
            margin: 0 auto;
            padding: 80px 24px;
            text-align: center;
        }
        .check-circle {
            width: 64px;
            height: 64px;
            background: #dcfce7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        p {
            color: #64748b;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .btn-back {
            display: inline-block;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }
        .btn-back:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <nav class="nav">
        <a class="nav-logo" href="/">Talent<span>Bridge</span></a>
    </nav>
    <div class="container">
        <div class="check-circle">&#10003;</div>
        <h1>Application Submitted</h1>
        <p>
            Your application for <strong>Senior ML Engineer</strong> at <strong>Anthropic</strong>
            has been received. The hiring team will review your materials and reach out if
            there's a match. You'll receive a confirmation email shortly.
        </p>
        <a href="/" class="btn-back">Back to Job Board</a>
    </div>
</body>
</html>
