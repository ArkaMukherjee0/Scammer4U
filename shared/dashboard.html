<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benchmark Console | {{ env_name }}</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --container-bg: #161b22;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-red: #ff7b72;
            --accent-green: #3fb950;
            --font-mono: 'SF Mono', 'Fira Code', 'Roboto Mono', monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--container-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.25rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header span.tag {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(88, 166, 255, 0.4);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .actions { display: flex; gap: 15px; }
        .btn {
            background: #21262d;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn:hover { background: #30363d; }
        .btn-danger:hover { color: var(--accent-red); border-color: var(--accent-red); }

        main {
            padding: 40px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            flex: 1;
        }
        .stat-card h3 { color: var(--text-secondary); font-size: 0.8rem; margin: 0 0 10px 0; text-transform: uppercase; }
        .stat-card .val { font-size: 2rem; font-weight: 700; color: var(--accent-blue); }

        .log-section {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }
        .log-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
        }
        .log-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 0.85rem; }
        .log-table th { text-align: left; padding: 12px 25px; color: var(--text-secondary); border-bottom: 1px solid var(--border-color); font-weight: 400; }
        .log-table td { padding: 12px 25px; border-bottom: 1px solid var(--border-color); vertical-align: top; }
        .log-table tr:hover { background: rgba(255,255,255,0.02); }

        .severity-high { color: var(--accent-red); font-weight: 700; }
        .severity-medium { color: #f1b44c; }
        .pill { padding: 2px 6px; border-radius: 12px; border: 1px solid currentColor; font-size: 0.7rem; font-weight: 600; }

        .json-view { white-space: pre-wrap; word-break: break-all; color: var(--text-secondary); max-width: 400px; font-size: 0.75rem; }

        /* Animation for new logs */
        @keyframes flash { 0% { background: var(--accent-blue); opacity: 0.5; } 100% { background: transparent; } }
        .new-entry { animation: flash 1s ease-out; }
    </style>
</head>
<body>

    <header>
        <h1>
            <span>CAPTURE CONSOLE</span>
            <span class="tag">{{ env_id }}</span>
            <span style="opacity: 0.6; font-size: 1rem;">|</span>
            <span style="font-weight: 400;">{{ env_name }}</span>
        </h1>
        <div class="actions">
            <button class="btn" onclick="fetchResults()">Refresh Log</button>
            <button class="btn" onclick="exportCSV()">Export CSV</button>
            <button class="btn btn-danger" onclick="clearLogs()">Clear Buffer</button>
        </div>
    </header>

    <main>
        <div class="stats">
            <div class="stat-card"><h3>Submissions</h3><div class="val" id="count-total">0</div></div>
            <div class="stat-card"><h3>PII Events</h3><div class="val" id="count-pii" style="color: var(--accent-red)">0</div></div>
            <div class="stat-card"><h3>Success Rate</h3><div class="val" id="count-success" style="color: var(--accent-green)">0%</div></div>
        </div>

        <div class="log-section">
            <div class="log-header">
                <span id="log-status">BUFFER: READY</span>
                <span style="color: var(--text-secondary); font-size: 0.75rem;">Showing last 50 captures</span>
            </div>
            <table class="log-table">
                <thead>
                    <tr>
                        <th style="width: 15%">Time</th>
                        <th style="width: 15%">Attack Type</th>
                        <th style="width: 35%">Fields</th>
                        <th style="width: 35%">Notes</th>
                    </tr>
                </thead>
                <tbody id="log-body">
                    <!-- Logs populated via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        let logs = [];

        async function fetchResults() {
            try {
                const res = await fetch('/api/results');
                logs = await res.json();
                updateStats();
                renderLogs();
                document.getElementById('log-status').innerText = `BUFFER: ${logs.length} ENTRIES`;
            } catch (err) {
                document.getElementById('log-status').innerText = 'BUFFER: CONNECTION ERROR';
            }
        }

        function updateStats() {
            const total = logs.length;
            const pii = logs.filter(l => l.attack_type.includes('harvest') || l.attack_type.includes('credentials')).length;
            const success = logs.filter(l => l.task_completed).length;
            
            document.getElementById('count-total').innerText = total;
            document.getElementById('count-pii').innerText = pii;
            document.getElementById('count-success').innerText = total > 0 ? (success / total * 100).toFixed(0) + '%' : '0%';
        }

        function renderLogs() {
            const body = document.getElementById('log-body');
            body.innerHTML = '';
            
            [...logs].reverse().forEach(log => {
                const tr = document.createElement('tr');
                const time = new Date(log.timestamp).toLocaleTimeString();
                
                const isHigh = log.attack_type.includes('pii') || log.attack_type.includes('harvest');
                const piiBadge = isHigh ? `<span class="pill" style="color: var(--accent-red)">HIGH SENSITIVITY</span>` : '';

                tr.innerHTML = `
                    <td>${time}</td>
                    <td>
                        <div style="font-weight: 600; color: ${isHigh ? 'var(--accent-red)' : 'var(--accent-blue)'}">${log.attack_type.toUpperCase()}</div>
                        ${piiBadge}
                    </td>
                    <td>
                        <div class="json-view">${JSON.stringify(log.fields || {}, null, 2)}</div>
                    </td>
                    <td style="color: var(--text-secondary); font-size: 0.8rem;">
                        ${log.notes || 'No telemetry notes.'}
                        <div style="margin-top: 5px; opacity: 0.6; font-size: 0.7rem;">
                            Triggered: ${log.attack_triggered} | Detected: ${log.attack_detected} | Completed: ${log.task_completed}
                        </div>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        async function clearLogs() {
            if (confirm('Clear all session data?')) {
                await fetch('/api/clear');
                fetchResults();
            }
        }

        function exportCSV() {
            if (logs.length === 0) return alert('No data to export.');
            let csv = 'Time,Type,Fields,Notes\n';
            logs.forEach(l => {
                csv += `"${l.timestamp}","${l.attack_type}","${JSON.stringify(l.fields).replace(/"/g, '""')}","${l.notes}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `capture_${new Date().toISOString()}.csv`);
            a.click();
        }

        setInterval(fetchResults, 5000);
        fetchResults();
    </script>
</body>
</html>
